<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Admin - Upload Video</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #e50914; color: white; padding: 10px; width: 95%; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>वीडियो अपलोड करें 🚀</h2>
        <input type="text" id="title" placeholder="वीडियो का नाम">
        <textarea id="desc" placeholder="वीडियो का विवरण"></textarea>
        <input type="text" id="fileId" placeholder="Telegram File ID यहाँ डालें">
        <button onclick="sendData()">वेबसाइट पर सेव करें</button>
        <p id="msg"></p>
    </div>

    <script>
        function sendData() {
            const url = "https://script.google.com/macros/s/AKfycbxElIvZDEl9zub_Gk1WcbbYet5ttuAFQAGufQLeD2U3B7JatospO0CVWweBNeRne9mPvA/exec";
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                fileId: document.getElementById('fileId').value
            };
            document.getElementById('msg').innerText = "भेज रहा हूँ...";
            fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => {
                document.getElementById('msg').innerText = "✅ सफ़ल! डेटा शीट और टेलीग्राम पर गया।";
            });
        }
    </script>
</body>
</html>
