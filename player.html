<!DOCTYPE html>
<html>
<body style="background:#000; color:white; text-align:center; margin:0;">
    <div id="player" style="width:100%; height:80vh; background:#111;">
        <p>वीडियो लोड हो रहा है...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('id');
        // यहाँ हम बोट के ज़रिए वीडियो दिखाएंगे
        document.getElementById('player').innerHTML = `<iframe src="https://t.me/c/8528668387/${fileId}?embed=1" width="100%" height="100%" frameborder="0"></iframe>`;
    </script>
    <button onclick="history.back()" style="padding:10px; margin-top:20px;">वापस जाएं</button>
</body>
</html>
