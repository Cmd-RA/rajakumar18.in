<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Raja AI Upload</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid #ff0000; }
        h2 { color: #ff0000; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { background: #ff0000; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #cc0000; }
        #msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>नया वीडियो डालें 🚀</h2>
        <input type="text" id="title" placeholder="वीडियो का नाम (Title)">
        <textarea id="desc" placeholder="वीडियो का विवरण (Description)" rows="3"></textarea>
        <input type="text" id="fileId" placeholder="Telegram File ID यहाँ पेस्ट करें">
        <button onclick="sendData()">वेबसाइट पर लाइव करें</button>
        <p id="msg"></p>
    </div>

    <script>
        function sendData() {
            const url = "https://script.google.com/macros/s/AKfycbxElIvZDEl9zub_Gk1WcbbYet5ttuAFQAGufQLeD2U3B7JatospO0CVWweBNeRne9mPvA/exec";
            const btn = document.querySelector('button');
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                fileId: document.getElementById('fileId').value
            };

            if(!data.title || !data.fileId) { alert("कृपया नाम और ID भरें!"); return; }

            document.getElementById('msg').innerText = "प्रक्रिया चल रही है...";
            btn.disabled = true;

            fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
            .then(() => {
                document.getElementById('msg').style.color = "#00ff00";
                document.getElementById('msg').innerText = "✅ सफ़ल! वीडियो लाइव हो गया है।";
                document.getElementById('title').value = "";
                document.getElementById('desc').value = "";
                document.getElementById('fileId').value = "";
                btn.disabled = false;
            })
            .catch(() => {
                document.getElementById('msg').innerText = "❌ गलती हुई, दोबारा कोशिश करें।";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
