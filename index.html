<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja AI Cinema - Home</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #ff0000; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #1e1e1e; border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); border-color: #ff0000; }
        .thumb { height: 160px; background: linear-gradient(45deg, #2c3e50, #000000); display: flex; align-items: center; justify-content: center; font-size: 50px; position: relative; }
        .thumb::after { content: '▶'; color: rgba(255,255,255,0.7); font-size: 40px; }
        .info { padding: 15px; }
        .info b { display: block; font-size: 18px; margin-bottom: 8px; color: #efefef; }
        .info p { font-size: 14px; color: #aaaaaa; margin: 0; line-height: 1.4; }
        #loading { text-align: center; font-size: 20px; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <h1>RAJA AI CINEMA 🎬</h1>
    </header>

    <div id="loading">वीडियो लोड हो रहे हैं, कृपया रुकें...</div>
    <div class="grid" id="container"></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxElIvZDEl9zub_Gk1WcbbYet5ttuAFQAGufQLeD2U3B7JatospO0CVWweBNeRne9mPvA/exec";
        
        fetch(url)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            let html = "";
            data.reverse().forEach(v => {
                html += `
                <div class="card" onclick="window.location.href='player.html?id=${v.fileId}'">
                    <div class="thumb"></div>
                    <div class="info">
                        <b>${v.title}</b>
                        <p>${v.description}</p>
                    </div>
                </div>`;
            });
            document.getElementById('container').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('loading').innerText = "सर्वर से कनेक्ट नहीं हो पा रहा है।";
        });
    </script>
</body>
</html>
