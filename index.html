<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja AI Cinema</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: #1c1c1c; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .thumb { height: 140px; background: linear-gradient(to right, #ff416c, #ff4b2b); display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .info { padding: 10px; }
    </style>
</head>
<body>
    <h1>राजा सिनेमा 🎬</h1>
    <div class="grid" id="container">लोड हो रहा है...</div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxElIvZDEl9zub_Gk1WcbbYet5ttuAFQAGufQLeD2U3B7JatospO0CVWweBNeRne9mPvA/exec";
        fetch(url).then(res => res.json()).then(data => {
            let html = "";
            data.reverse().forEach(v => {
                html += `<div class="card" onclick="window.location.href='player.html?id=${v.fileId}'">
                    <div class="thumb">▶️</div>
                    <div class="info"><b>${v.title}</b><p style='color:gray; font-size:12px;'>${v.description}</p></div>
                </div>`;
            });
            document.getElementById('container').innerHTML = html;
        });
    </script>
</body>
</html>
