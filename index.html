<!DOCTYPE html>
<html>
<head>
  <title>My Video App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
    }

    header {
      background: red;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 10px;
    }

    .video-card {
      background: #222;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }

    h3 {
      margin: 5px 0;
    }

    .upload-box {
      background: #222;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }

    input, textarea, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🎬 My Video App</header>

<div class="upload-box">
  <h3>Upload Video</h3>
  <input id="title" placeholder="Title">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="fileId" placeholder="Telegram File ID">
  <button onclick="upload()">Upload</button>
</div>

<div class="container" id="videos"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzISaC1L-J-gQr6WwHT6FIT7vzGStoXhuGViorcB4PswSR9ZJGLUKJcxwdySNhyX6oUxw/exec";

// Load videos
function loadVideos() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach(v => {
        html += `
          <div class="video-card">
            <h3>${v.title}</h3>
            <p>${v.description}</p>
          </div>
        `;
      });

      document.getElementById("videos").innerHTML = html;
    });
}

// Upload video
function upload() {
  let data = {
    title: document.getElementById("title").value,
    description: document.getElementById("desc").value,
    fileId: document.getElementById("fileId").value
  };

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    alert("Upload Success ✅");
    loadVideos();
  });
}

loadVideos();
</script>

</body>
</html>
